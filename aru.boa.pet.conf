# Lidl termék-elérhetőség — static site nginx config
#
# Deploy:
#   sudo cp termekek.nginx.conf /etc/nginx/sites-available/termekek
#   sudo ln -s /etc/nginx/sites-available/termekek /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# (On RHEL/Fedora-style layouts, drop it in /etc/nginx/conf.d/termekek.conf instead.)
#
# The site is 100% static files served straight from the project directory.
# track.py / booklets.py just rewrite data/latest.json on a schedule; nginx
# only needs to serve files, so there is no upstream/proxy to configure.

server {
    listen 80;
    listen [::]:80;

    # Change this to your domain (or "_" to catch any host on this server).
    server_name aru.boa.pet;

    root /home/boa/aru.boa.pet;
    index index.html;

    # Compress text assets on the fly. The JSON snapshots and Leaflet JS/CSS
    # are the bulk of the payload and compress very well.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_vary on;

    # The snapshot the frontend polls. It is overwritten every run, so never
    # let a proxy or the browser serve a stale copy. (app.js already sends
    # cache:"no-store"; this enforces it server-side too.)
    location = /data/latest.json {
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    # Timestamped historical snapshots and other data files are immutable once
    # written, so they may be cached briefly.
    location /data/ {
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri =404;
    }

    # Vendored Leaflet build is versioned and never changes in place.
    location /vendor/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # App shell. Short cache so a redeploy of app.js/style.css/index.html is
    # picked up quickly without a hard refresh.
    location / {
        add_header Cache-Control "public, max-age=60" always;
        try_files $uri $uri/ =404;
    }

    # Don't serve the scraper internals, scratch data, or the config itself.
    location ~ \.(py|conf)$            { return 404; }
    location ~ /(__pycache__|\.git)/   { return 404; }
    location = /data/.track-progress.json { return 404; }

    access_log /var/log/nginx/termekek.access.log;
    error_log  /var/log/nginx/termekek.error.log;
}
